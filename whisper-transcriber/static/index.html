<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper Transcriber</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card-hover:#222531;--border:#2a2d3a;--text:#e4e4e7;--text-dim:#71717a;--accent:#7c3aed;--accent-hover:#6d28d9;--accent-glow:rgba(124,58,237,.25);--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--radius:12px;--radius-sm:8px}
html{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:0}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit}

.container{max-width:900px;margin:0 auto;padding:24px 20px 60px}

/* Header */
.header{text-align:center;padding:40px 0 32px}
.header h1{font-size:2rem;font-weight:700;letter-spacing:-.02em}
.header .subtitle{color:var(--text-dim);font-size:.875rem;margin-top:6px}
.gpu-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:.8rem;font-weight:500}
.gpu-badge .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gpu-badge .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.gpu-badge .dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:16px}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-glow)}
.upload-zone.has-file{border-style:solid;border-color:var(--accent)}
.upload-icon{font-size:2.5rem;margin-bottom:12px}
.upload-text{color:var(--text-dim);font-size:.9rem}
.upload-text strong{color:var(--text)}
.file-info{margin-top:12px;font-size:.85rem;color:var(--accent)}
.file-info .file-size{color:var(--text-dim);margin-left:8px}
input[type=file]{display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-hover)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--card-hover)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:6px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

.transcribe-row{display:flex;align-items:center;gap:12px;margin-top:16px}

/* Options panel */
.options-toggle{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text-dim);font-size:.85rem;font-weight:500;padding:0;margin-bottom:12px}
.options-toggle .arrow{transition:transform .2s;font-size:.7rem}
.options-toggle .arrow.open{transform:rotate(90deg)}
.options-grid{display:none;grid-template-columns:1fr 1fr;gap:16px}
.options-grid.open{display:grid}
.form-group label{display:block;font-size:.78rem;font-weight:500;color:var(--text-dim);margin-bottom:6px}
.form-group select,.form-group input[type=range]{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none}
.form-group select:focus{border-color:var(--accent)}
.form-group input[type=range]{padding:0;margin-top:4px;accent-color:var(--accent)}
.range-value{font-size:.78rem;color:var(--accent);float:right}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* Progress */
.progress-section{display:none}
.progress-section.active{display:block}
.progress-bar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:12px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width .3s;width:0%}
.progress-bar-fill.indeterminate{width:30%!important;animation:indeterminate 1.5s infinite ease-in-out}
@keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.progress-info{display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.progress-status{color:var(--text)}
.progress-elapsed{color:var(--text-dim);font-size:.78rem}

/* Results */
.result-section{display:none}
.result-section.active{display:block}
.result-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.meta-badge{padding:5px 12px;background:var(--bg);border-radius:6px;font-size:.78rem;display:flex;align-items:center;gap:6px}
.meta-badge .label{color:var(--text-dim)}
.transcript-viewer{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;max-height:400px;overflow-y:auto;font-size:.85rem;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.seg-time{color:var(--accent);font-size:.75rem;font-weight:600;margin-right:8px;user-select:none}
.word-highlight{background:var(--accent-glow);border-radius:3px;padding:1px 2px}

/* History */
.history-table{width:100%;border-collapse:collapse;font-size:.82rem}
.history-table th{text-align:left;padding:10px 12px;color:var(--text-dim);font-weight:600;border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em}
.history-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.history-table tr:hover td{background:var(--card-hover)}
.status-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.status-pill.completed{background:rgba(34,197,94,.15);color:var(--green)}
.status-pill.processing{background:rgba(124,58,237,.15);color:#a78bfa}
.status-pill.error{background:rgba(239,68,68,.15);color:var(--red)}
.status-pill.pending{background:rgba(113,113,122,.15);color:var(--text-dim)}
.status-pill.cancelled{background:rgba(245,158,11,.15);color:var(--orange)}
.history-actions{display:flex;gap:4px}
.history-actions button{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;font-size:.85rem;border-radius:4px}
.history-actions button:hover{color:var(--text);background:var(--bg)}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px}
.empty-state{text-align:center;padding:32px;color:var(--text-dim);font-size:.85rem}

/* Responsive */
@media(max-width:600px){
  .container{padding:16px 12px 40px}
  .header h1{font-size:1.5rem}
  .options-grid{grid-template-columns:1fr}
  .result-meta{gap:8px}
  .history-table{font-size:.75rem}
  .history-table th:nth-child(3),.history-table td:nth-child(3),
  .history-table th:nth-child(5),.history-table td:nth-child(5){display:none}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3d4a}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>&#127897;&#65039; Whisper Transcriber</h1>
    <div class="subtitle">faster-whisper &middot; large-v3 &middot; RTX 3090 Ti</div>
    <div class="gpu-badge" id="gpuBadge">
      <span class="dot" id="gpuDot"></span>
      <span id="gpuText">Checking GPU...</span>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">&#128194;</div>
      <div class="upload-text"><strong>Drop audio or video file here</strong><br>or click to browse</div>
      <div class="file-info" id="fileInfo" style="display:none">
        <span id="fileName"></span><span class="file-size" id="fileSize"></span>
      </div>
      <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.m4a,.ogg,.flac,.mov,.mkv,.webm">
    </div>

    <!-- Options -->
    <div style="margin-top:16px">
      <button class="options-toggle" id="optionsToggle">
        <span class="arrow" id="optionsArrow">&#9654;</span> Advanced Options
      </button>
      <div class="options-grid" id="optionsGrid">
        <div class="form-group">
          <label>Model Size</label>
          <select id="optModel">
            <option value="tiny">Tiny (fastest)</option>
            <option value="base">Base</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large-v3" selected>Large-v3 (best)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Language</label>
          <select id="optLanguage">
            <option value="auto">Auto-detect</option>
            <option value="af">Afrikaans</option><option value="ar">Arabic</option><option value="hy">Armenian</option>
            <option value="az">Azerbaijani</option><option value="be">Belarusian</option><option value="bs">Bosnian</option>
            <option value="bg">Bulgarian</option><option value="ca">Catalan</option><option value="zh">Chinese</option>
            <option value="hr">Croatian</option><option value="cs">Czech</option><option value="da">Danish</option>
            <option value="nl">Dutch</option><option value="en">English</option><option value="et">Estonian</option>
            <option value="fi">Finnish</option><option value="fr">French</option><option value="gl">Galician</option>
            <option value="de">German</option><option value="el">Greek</option><option value="he">Hebrew</option>
            <option value="hi">Hindi</option><option value="hu">Hungarian</option><option value="is">Icelandic</option>
            <option value="id">Indonesian</option><option value="it">Italian</option><option value="ja">Japanese</option>
            <option value="kn">Kannada</option><option value="kk">Kazakh</option><option value="ko">Korean</option>
            <option value="lv">Latvian</option><option value="lt">Lithuanian</option><option value="mk">Macedonian</option>
            <option value="ms">Malay</option><option value="mr">Marathi</option><option value="mi">Maori</option>
            <option value="ne">Nepali</option><option value="no">Norwegian</option><option value="fa">Persian</option>
            <option value="pl">Polish</option><option value="pt">Portuguese</option><option value="ro">Romanian</option>
            <option value="ru">Russian</option><option value="sr">Serbian</option><option value="sk">Slovak</option>
            <option value="sl">Slovenian</option><option value="es">Spanish</option><option value="sw">Swahili</option>
            <option value="sv">Swedish</option><option value="tl">Tagalog</option><option value="ta">Tamil</option>
            <option value="th">Thai</option><option value="tr">Turkish</option><option value="uk">Ukrainian</option>
            <option value="ur">Urdu</option><option value="vi">Vietnamese</option><option value="cy">Welsh</option>
          </select>
        </div>
        <div class="form-group">
          <label>Compute Type</label>
          <select id="optCompute">
            <option value="float16">float16 (faster)</option>
            <option value="int8">int8 (less VRAM)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Output Format</label>
          <select id="optFormat">
            <option value="srt">SRT</option>
            <option value="vtt">VTT</option>
            <option value="txt">Plain Text</option>
            <option value="json">JSON</option>
          </select>
        </div>
        <div class="form-group">
          <label class="toggle-row">Word Timestamps <span class="toggle on" id="toggleWordTs" data-val="true"></span></label>
        </div>
        <div class="form-group">
          <label>Beam Size <span class="range-value" id="beamVal">5</span></label>
          <input type="range" id="optBeam" min="1" max="10" value="5">
        </div>
      </div>
    </div>

    <div class="transcribe-row">
      <button class="btn btn-primary" id="btnTranscribe" disabled>Transcribe</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card progress-section" id="progressSection">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-info">
      <span class="progress-status" id="progressStatus">Starting...</span>
      <span class="progress-elapsed" id="progressElapsed">0:00</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-danger btn-sm" id="btnCancel">Cancel</button>
    </div>
  </div>

  <!-- Results -->
  <div class="card result-section" id="resultSection">
    <div class="card-title">Result</div>
    <div class="result-meta" id="resultMeta"></div>
    <div class="transcript-viewer" id="transcriptViewer"></div>
    <div class="btn-group">
      <button class="btn btn-secondary btn-sm" onclick="downloadResult('srt')">&#128196; SRT</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadResult('vtt')">&#128196; VTT</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadResult('txt')">&#128196; TXT</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadResult('json')">&#128196; JSON</button>
      <button class="btn btn-secondary btn-sm" id="btnCopy">&#128203; Copy</button>
      <button class="btn btn-primary btn-sm" id="btnNew">&#10010; New Transcription</button>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">History</div>
    <div id="historyContent"><div class="empty-state">No transcriptions yet</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
const API = window.location.origin;
let currentJobId = null;
let pollTimer = null;
let elapsedTimer = null;
let elapsedStart = 0;
let selectedFile = null;
let historyPage = 1;

// Elements
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const btnTranscribe = document.getElementById('btnTranscribe');
const progressSection = document.getElementById('progressSection');
const progressBar = document.getElementById('progressBar');
const progressStatus = document.getElementById('progressStatus');
const progressElapsed = document.getElementById('progressElapsed');
const resultSection = document.getElementById('resultSection');
const resultMeta = document.getElementById('resultMeta');
const transcriptViewer = document.getElementById('transcriptViewer');
const btnCancel = document.getElementById('btnCancel');
const btnCopy = document.getElementById('btnCopy');
const btnNew = document.getElementById('btnNew');
const gpuDot = document.getElementById('gpuDot');
const gpuText = document.getElementById('gpuText');

// GPU check
fetch(API + '/health').then(r => r.json()).then(d => {
  if (d.gpu) {
    gpuDot.className = 'dot on';
    gpuText.textContent = 'GPU Ready';
  } else {
    gpuDot.className = 'dot off';
    gpuText.textContent = 'CPU Mode';
  }
}).catch(() => {
  gpuDot.className = 'dot off';
  gpuText.textContent = 'Offline';
});

// Upload zone events
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

function handleFile(f) {
  const ext = f.name.split('.').pop().toLowerCase();
  const allowed = ['mp3','mp4','wav','m4a','ogg','flac','mov','mkv','webm'];
  if (!allowed.includes(ext)) { alert('Unsupported format: .' + ext); return; }
  selectedFile = f;
  fileName.textContent = f.name;
  fileSize.textContent = formatSize(f.size);
  fileInfo.style.display = '';
  uploadZone.classList.add('has-file');
  btnTranscribe.disabled = false;
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

// Options toggle
document.getElementById('optionsToggle').addEventListener('click', () => {
  const grid = document.getElementById('optionsGrid');
  const arrow = document.getElementById('optionsArrow');
  grid.classList.toggle('open');
  arrow.classList.toggle('open');
});

// Toggle switches
document.getElementById('toggleWordTs').addEventListener('click', function() {
  const on = this.dataset.val === 'true';
  this.dataset.val = on ? 'false' : 'true';
  this.classList.toggle('on');
});

// Beam size
document.getElementById('optBeam').addEventListener('input', function() {
  document.getElementById('beamVal').textContent = this.value;
});

// Transcribe
btnTranscribe.addEventListener('click', startTranscription);

function startTranscription() {
  if (!selectedFile) return;
  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('model_size', document.getElementById('optModel').value);
  fd.append('language', document.getElementById('optLanguage').value);
  fd.append('compute_type', document.getElementById('optCompute').value);
  fd.append('word_timestamps', document.getElementById('toggleWordTs').dataset.val);
  fd.append('output_format', document.getElementById('optFormat').value);
  fd.append('beam_size', document.getElementById('optBeam').value);

  btnTranscribe.disabled = true;
  resultSection.classList.remove('active');
  progressSection.classList.add('active');
  progressBar.style.width = '0%';
  progressBar.classList.remove('indeterminate');
  progressStatus.textContent = 'Uploading...';

  elapsedStart = Date.now();
  elapsedTimer = setInterval(() => {
    const s = Math.floor((Date.now() - elapsedStart) / 1000);
    progressElapsed.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  }, 1000);

  fetch(API + '/transcribe', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => {
      if (d.error) throw new Error(d.error);
      currentJobId = d.job_id;
      progressStatus.textContent = 'Processing...';
      pollTimer = setInterval(pollStatus, 1000);
    })
    .catch(e => {
      progressStatus.textContent = 'Error: ' + e.message;
      clearInterval(elapsedTimer);
      btnTranscribe.disabled = false;
    });
}

function pollStatus() {
  if (!currentJobId) return;
  fetch(API + '/status/' + currentJobId)
    .then(r => r.json())
    .then(d => {
      if (d.status === 'processing') {
        const p = d.progress || 0;
        progressBar.classList.remove('indeterminate');
        progressBar.style.width = p + '%';
        progressStatus.textContent = d.status_text || 'Processing...';
      } else if (d.status === 'completed') {
        clearInterval(pollTimer);
        clearInterval(elapsedTimer);
        progressBar.style.width = '100%';
        progressStatus.textContent = 'Complete!';
        loadResult(currentJobId);
        loadHistory();
      } else if (d.status === 'error') {
        clearInterval(pollTimer);
        clearInterval(elapsedTimer);
        progressStatus.textContent = 'Error: ' + (d.error || 'Unknown error');
        btnTranscribe.disabled = false;
      } else if (d.status === 'cancelled') {
        clearInterval(pollTimer);
        clearInterval(elapsedTimer);
        progressStatus.textContent = 'Cancelled';
        progressSection.classList.remove('active');
        btnTranscribe.disabled = false;
        loadHistory();
      }
    });
}

function loadResult(jobId) {
  fetch(API + '/result/' + jobId)
    .then(r => r.json())
    .then(d => {
      if (d.error) return;
      // Meta badges
      const speed = d.duration && d.transcription_time ? (d.duration / d.transcription_time).toFixed(1) : '?';
      const langConf = d.language_confidence ? (d.language_confidence * 100).toFixed(0) : '?';
      resultMeta.innerHTML = `
        <div class="meta-badge"><span class="label">Language</span> ${d.detected_language || '?'} (${langConf}%)</div>
        <div class="meta-badge"><span class="label">Duration</span> ${formatDuration(d.duration)}</div>
        <div class="meta-badge"><span class="label">Speed</span> ${speed}x realtime</div>
        <div class="meta-badge"><span class="label">Model</span> ${d.model_size}</div>
      `;
      // Transcript
      let html = '';
      if (d.segments && d.segments.length) {
        d.segments.forEach(seg => {
          const ts = formatDuration(seg.start);
          if (d.word_timestamps && seg.words && seg.words.length) {
            html += `<div><span class="seg-time">[${ts}]</span>`;
            seg.words.forEach(w => {
              const cls = w.probability < 0.5 ? ' class="word-highlight"' : '';
              html += `<span${cls}>${escHtml(w.word)}</span>`;
            });
            html += '</div>';
          } else {
            html += `<div><span class="seg-time">[${ts}]</span>${escHtml(seg.text)}</div>`;
          }
        });
      } else {
        html = escHtml(d.text || 'No transcription text');
      }
      transcriptViewer.innerHTML = html;
      resultSection.classList.add('active');
    });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDuration(s) {
  if (!s && s !== 0) return '?';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function downloadResult(fmt) {
  if (!currentJobId) return;
  window.open(API + '/download/' + currentJobId + '/' + fmt, '_blank');
}

// Cancel
btnCancel.addEventListener('click', () => {
  if (!currentJobId) return;
  fetch(API + '/cancel/' + currentJobId, { method: 'POST' });
});

// Copy
btnCopy.addEventListener('click', () => {
  const text = transcriptViewer.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btnCopy.textContent = '\u2713 Copied!';
    setTimeout(() => { btnCopy.innerHTML = '&#128203; Copy'; }, 2000);
  });
});

// New transcription
btnNew.addEventListener('click', () => {
  currentJobId = null;
  selectedFile = null;
  fileInput.value = '';
  fileInfo.style.display = 'none';
  uploadZone.classList.remove('has-file');
  btnTranscribe.disabled = true;
  progressSection.classList.remove('active');
  resultSection.classList.remove('active');
});

// History
function loadHistory(page) {
  page = page || 1;
  historyPage = page;
  fetch(API + '/history?page=' + page + '&per_page=10')
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('historyContent');
      const pg = document.getElementById('pagination');
      if (!d.jobs || !d.jobs.length) {
        el.innerHTML = '<div class="empty-state">No transcriptions yet</div>';
        pg.innerHTML = '';
        return;
      }
      let html = '<table class="history-table"><thead><tr><th>File</th><th>Duration</th><th>Model</th><th>Language</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>';
      d.jobs.forEach(j => {
        const name = j.original_filename || '?';
        const short = name.length > 30 ? name.slice(0,27) + '...' : name;
        const dur = j.duration ? formatDuration(j.duration) : '-';
        const lang = j.detected_language || '-';
        const date = j.created_at ? j.created_at.slice(0,16).replace('T',' ') : '-';
        html += `<tr>
          <td title="${escHtml(name)}">${escHtml(short)}</td>
          <td>${dur}</td>
          <td>${j.model_size || '-'}</td>
          <td>${lang}</td>
          <td>${date}</td>
          <td><span class="status-pill ${j.status}">${j.status}</span></td>
          <td><div class="history-actions">`;
        if (j.status === 'completed') {
          html += `<button title="View" onclick="viewJob('${j.id}')">&#128065;</button>`;
          html += `<button title="Download SRT" onclick="window.open('${API}/download/${j.id}/srt')">&#11015;</button>`;
        }
        html += `<button title="Delete" onclick="deleteJob('${j.id}')">&#128465;</button>`;
        html += '</div></td></tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;

      // Pagination
      const totalPages = Math.ceil(d.total / d.per_page);
      let pgHtml = '';
      for (let i = 1; i <= totalPages; i++) {
        pgHtml += `<button class="btn btn-sm ${i===page?'btn-primary':'btn-secondary'}" onclick="loadHistory(${i})">${i}</button>`;
      }
      pg.innerHTML = pgHtml;
    });
}

function viewJob(id) {
  currentJobId = id;
  loadResult(id);
  resultSection.scrollIntoView({ behavior: 'smooth' });
}

function deleteJob(id) {
  if (!confirm('Delete this job?')) return;
  fetch(API + '/delete/' + id, { method: 'DELETE' })
    .then(() => loadHistory(historyPage));
}

// Init
loadHistory();
</script>
</body>
</html>
